version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: logistic-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password

  backend:
    build:
      context: ./backend
    container_name: logistic-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://admin:password@mongodb:27017/logistic?authSource=admin
      - JWT_SECRET=supersecretjwtkey_please_change_in_production
      - FRONTEND_URL=http://localhost:5173
      - CORS_ORIGIN=http://localhost:5173,http://localhost
      - SMTP_HOST=smtp.ethereal.email
      - SMTP_PORT=587

  frontend:
    build:
      context: ./frontend
    container_name: logistic-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
